<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue rounded square background -->
  <rect width="100" height="100" rx="22" fill="#2563EB"/>
  <!-- Flask neck -->
  <rect x="38" y="14" width="24" height="36" rx="5" fill="white"/>
  <!-- Flask rim -->
  <rect x="33" y="10" width="34" height="10" rx="5" fill="white"/>
  <!-- Flask body -->
  <path d="M36 50 L18 78 Q13 88 22 90 L78 90 Q87 88 82 78 L64 50 Z" fill="white"/>
  <!-- Liquid fill -->
  <path d="M22 74 L18 80 Q13 88 22 90 L78 90 Q87 88 82 80 L78 74 Z" fill="#93C5FD"/>
  <!-- Bubbles -->
  <circle cx="33" cy="83" r="4" fill="white" opacity="0.55"/>
  <circle cx="50" cy="80" r="3" fill="white" opacity="0.5"/>
  <circle cx="64" cy="84" r="3.5" fill="white" opacity="0.45"/>
  <!-- Score "5" inside flask -->
  <text x="50" y="43" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#2563EB">5</text>
  <!-- Highlight on neck -->
  <rect x="41" y="18" width="7" height="26" rx="3.5" fill="white" opacity="0.3"/>
</svg>
